function getStage(stars) { let stage = STAGES[0]; for (const s of STAGES) if (stars >= s.min) stage = s; return stage; }
function nextStage(stars) { return STAGES.find(s => s.min > stars) || null; }
function daysWeeksUntil(target) {
  const now = new Date();
  const diffMs = target.getTime() - now.getTime();
  const days = Math.max(0, Math.ceil(diffMs / 86400000));
  return { days, weeks: Math.floor(days / 7), remDays: days % 7 };
}
function startOfWeek(d) {
  const date = new Date(d);
  const day = date.getDay();
  date.setDate(date.getDate() - day + (day === 0 ? -6 : 1));
  date.setHours(0,0,0,0);
  return date;
}
function weekKey(ts) { return startOfWeek(new Date(ts)).toISOString().slice(0,10); }
function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ====================== STORAGE ======================
const STORAGE_KEY = "eva-study-garden-state";
const DEFAULT_STATE = {

function loadState() {

  } catch(e) { console.error("load failed", e); }
  return null;
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

}

// ====================== AI CALL (BYO API key, optional) ======================
// Since this is a standalone static site (e.g. GitHub Pages), there is no
// built-in backend to call Claude on your behalf. To use the Vocab Generator
// and Paper Question Generator, enter your own Anthropic API key below (stored
// only in your browser's localStorage, never sent anywhere except Anthropic).
function getApiKey() {
  return localStorage.getItem("eva-study-garden-api-key") || "";
}
function setApiKey(key) {
  localStorage.setItem("eva-study-garden-api-key", key);
}

async function callClaude(messages, system) {
  const apiKey = getApiKey();
  if (!apiKey) {
    throw new Error("NO_API_KEY");
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      system: system,
      messages: messages,
    }),
  });
  if (!res.ok) {
    const errText = await res.text();
    throw new Error("API_ERROR: " + errText);
  }
  const data = await res.json();
  const textBlocks = (data.content || []).filter(c => c.type === "text").map(c => c.text);
  return textBlocks.join("\n");
}

function extractJson(text) {
  let clean = text.trim().replace(/```json/g,"").replace(/```/g,"").trim();
  try { return JSON.parse(clean); } catch(e) {
    const firstObj = clean.indexOf("{");
    const firstArr = clean.indexOf("[");
    let first = -1;
    if (firstObj === -1) first = firstArr;
    else if (firstArr === -1) first = firstObj;
    else first = Math.min(firstObj, firstArr);
    const last = Math.max(clean.lastIndexOf("}"), clean.lastIndexOf("]"));
    if (first !== -1 && last !== -1) {
      try { return JSON.parse(clean.slice(first, last+1)); } catch(e2) { return null; }
    }
    return null;
  }
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function burstConfetti() {
  const colors = ["#FFB3CB","#A5D8FF","#96F2D7","#FFE066","#D0BFFF"];
  for (let i=0;i<24;i++) {
    const piece = document.createElement("div");
    const left = Math.random()*100;
    const delay = Math.random()*0.4;
    const dur = 1.2+Math.random()*0.8;
    const color = colors[i % colors.length];
    piece.style.position = "fixed";
    piece.style.left = left+"%";
    piece.style.top = "-10px";
    piece.style.width = "8px";
    piece.style.height = "8px";
    piece.style.background = color;
    piece.style.borderRadius = i%2===0 ? "50%" : "2px";
    piece.style.zIndex = "999";
    piece.style.pointerEvents = "none";
    piece.style.animation = `fall ${dur}s ${delay}s ease-in forwards`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), (dur+delay)*1000+100);
  }
}
const styleTag = document.createElement("style");

function renderHome() {

  const lastWeekKey = weekKey(now - 7*86400000);
  const tasksThisWeek = state.tasks.filter(t => t.done && t.completedAt && weekKey(t.completedAt)===thisWeekKey).length;
  const tasksLastWeek = state.tasks.filter(t => t.done && t.completedAt && weekKey(t.completedAt)===lastWeekKey).length;

        <div style="width:${progress}%;height:100%;background:linear-gradient(90deg,#FFB3CB,#A5D8FF);border-radius:10px;"></div>

    <div class="card" style="background:linear-gradient(135deg,#FFD8A8,#FFEC99);text-align:center;">

    </div>

    <div class="card" style="display:flex;align-items:center;gap:12px;">
      <div style="font-size:30px;">🔥</div>
      <div style="flex:1;">
        <div style="font-weight:800;font-size:16px;color:#495057;">${state.streak} day streak</div>
        <div style="font-size:11px;color:#adb5bd;">${state.freezeAvailable ? "🧊 1 streak freeze available — miss a day without losing your streak!" : "No freeze available — complete tasks to earn one back."}</div>
      </div>
    </div>

    <div class="card" style="background:#FFF0F6;text-align:center;font-size:13px;color:#A61E4D;font-weight:600;">
      ${msg}

function toggleTask(id) {
  const task = state.tasks.find(t => t.id===id);
  if (!task) return;
  const willBeDone = !task.done;
  task.done = willBeDone;
  task.completedAt = willBeDone ? Date.now() : null;
  if (willBeDone) {
    state.stars += 2;
    state.carrots += 1;
    const today = new Date().toDateString();
    if (state.lastCompletionDate !== today) {
      const yesterday = new Date(Date.now()-86400000).toDateString();
      if (state.lastCompletionDate === yesterday) {
        state.streak += 1;
      } else if (state.freezeAvailable && state.lastCompletionDate) {
        state.streak += 1;
        state.freezeAvailable = false;
      } else {
        state.streak = 1;
      }
      state.lastCompletionDate = today;
      if (state.streak>0 && state.streak%7===0) state.freezeAvailable = true;
    }
    burstConfetti();
    flashToast("+2 ⭐ +1 🥕 Task complete!");
  } else {
    state.stars = Math.max(0, state.stars-2);
    state.carrots = Math.max(0, state.carrots-1);
  }
  persist();
  render();
}
function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  persist(); render();
}

async function handlePaperFile(e) {

  if (!file) return;
  if (file.type !== "application/pdf") { flashToast("Please upload a PDF file"); return; }
  if (file.size > MAX_PDF_BYTES) { flashToast("This PDF is quite large — try a smaller scan or fewer pages"); e.target.value=""; return; }
  papersUploading = true; render();

  papersUploading = false;

async function generateFromPaper(paperId) {
  const paper = state.papers.find(p=>p.id===paperId);
  if (!paper) return;
  if (!getApiKey()) { showApiKeyModal = true; render(); return; }
  papersGenerating = true;
  papersActivePaperId = paperId;
  papersQuestions = null;
  papersErrorMsg = null;
  render();
  try {
    const base64 = paper.dataUrl.split(",")[1];
    const errorNotes = state.errorBank.filter(er=>er.subject===paper.subject).map(er=>er.note).filter(Boolean).slice(0,10);
    const system = "You are a PSLE tutor. You will be given a PDF of a past year exam paper. It may be a scanned, image-based PDF — read it using your vision/document capability, page by page, exactly as if reading scanned photographs of paper. Even if the PDF has no selectable text layer, look at the visual content of each page. Respond ONLY with valid JSON: an array of 5 objects, each with keys: question, answer, explanation. If you genuinely cannot see any readable content in the PDF at all, respond with exactly: {\\"error\\": \\"unreadable\\"} and nothing else." + (errorNotes.length ? ` The student has previously struggled with: ${errorNotes.join("; ")}. Prioritise targeting these weak areas.` : "");
    const messages = [{ role:"user", content:[
      { type:"document", source:{ type:"base64", media_type:"application/pdf", data: base64 } },
      { type:"text", text:`This is a ${paper.subject} PSLE past year paper. Generate 5 fresh practice questions in the same style, targeting the student's weak areas if provided.` }
    ]}];
    const text = await callClaude(messages, system);
    const parsed = extractJson(text);
    if (!parsed) {
      papersErrorMsg = "Couldn't understand the response. The scan may be too blurry, rotated, or low contrast. Try rescanning with good lighting and a straight angle.";
      papersQuestions = [];
    } else if (parsed.error === "unreadable") {
      papersErrorMsg = "This PDF couldn't be read — it might be password-protected, corrupted, or the scan quality is too low. Try re-scanning at higher resolution.";
      papersQuestions = [];
    } else if (Array.isArray(parsed)) {
      papersQuestions = parsed;
      state.carrots += 3;
      flashToast("+3 🥕 Practice questions ready!");
    } else {
      papersErrorMsg = "Unexpected response format. Please try again.";
      papersQuestions = [];
    }
  } catch(err) {
    if (err.message === "NO_API_KEY") { showApiKeyModal = true; }
    else papersErrorMsg = "Something went wrong reading this PDF. Check your internet connection / API key and try again, or try a smaller file.";
  }
  papersGenerating = false;
  persist(); render();
}

        </div>
      </div>
    ` : `<div class="empty"><div class="emoji">⏱</div><div class="text">Pick a PSLE paper below to start an exam timer.</div></div>`}
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px;">
      ${TIMERS.map(t => `<button data-start-timer="${t.id}" style="display:flex;justify-content:space-between;align-items:center;background:white;border:none;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);cursor:pointer;text-align:left;">
        <span style="font-size:13px;font-weight:700;color:#495057;">${t.label}</span>
        <span style="font-size:12px;color:#adb5bd;">${t.mins} min</span>
      </button>`).join("")}
    </div>
  `;
}
function startTimer(id) {
  const t = TIMERS.find(x=>x.id===id);
  if (!t) return;
  timerActiveId = id;
  timerSecondsLeft = t.mins*60;
  timerRunning = true;
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timerSecondsLeft -= 1;
    if (timerSecondsLeft<=0) { timerSecondsLeft=0; timerRunning=false; clearInterval(timerInterval); }
    render();
  },1000);
  render();
}
function timerPauseResume() {
  timerRunning = !timerRunning;
  if (timerRunning) {
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
      timerSecondsLeft -= 1;
      if (timerSecondsLeft<=0) { timerSecondsLeft=0; timerRunning=false; clearInterval(timerInterval); }
      render();
    },1000);
  } else {
    clearInterval(timerInterval);
  }
  render();
}
function timerReset() {
  clearInterval(timerInterval);
  timerActiveId = null; timerSecondsLeft = 0; timerRunning = false;
  render();
}

// ====================== SHOP TAB ======================
function renderShop() {
  return `
    <div style="text-align:center;margin-bottom:12px;font-size:13px;color:#868e96;">Spend your Carrots 🥕 on cute accessories and backgrounds! (Earn carrots from tasks, errors & vocab)</div>
    <div style="font-size:13px;font-weight:700;color:#495057;margin-bottom:8px;">🎀 Accessories</div>
    <div class="shop-grid">
      ${ACCESSORIES.map(item => {
        const owned = state.ownedAccessories.includes(item.id);
        const equipped = state.equippedAccessories.includes(item.id);
        return `<div class="shop-item">
          <div style="font-size:30px;">${item.emoji}</div>
          <div style="font-size:12px;font-weight:700;color:#495057;margin-top:4px;">${item.name}</div>
          ${!owned ? `<button data-buy-acc="${item.id}" style="margin-top:8px;width:100%;background:#FFD8A8;color:#9C6B00;border:none;border-radius:10px;padding:6px;font-weight:700;font-size:12px;cursor:pointer;">🥕 ${item.cost}</button>`
            : `<button data-equip-acc="${item.id}" style="margin-top:8px;width:100%;background:${equipped?'#82c91e':'#E9ECEF'};color:${equipped?'white':'#868e96'};border:none;border-radius:10px;padding:6px;font-weight:700;font-size:12px;cursor:pointer;">${equipped?'Equipped ✓':'Equip'}</button>`}
        </div>`;
      }).join("")}
    </div>
    <div style="font-size:13px;font-weight:700;color:#495057;margin:16px 0 8px;">🎨 Backgrounds</div>
    <div class="bg-grid">
      ${BACKGROUNDS.map(bg => {
        const owned = state.ownedBackgrounds.includes(bg.id);
        const equipped = state.equippedBackground === bg.id;
        return `<div class="bg-item" style="background:${bg.css};">
          <div style="background:rgba(255,255,255,0.85);border-radius:10px;padding:8px;">
            <div style="font-size:12px;font-weight:700;color:#495057;">${bg.name}</div>
            ${!owned ? `<button data-buy-bg="${bg.id}" style="margin-top:8px;width:100%;background:#FFD8A8;color:#9C6B00;border:none;border-radius:10px;padding:6px;font-weight:700;font-size:12px;cursor:pointer;">🥕 ${bg.cost}</button>`
              : `<button data-equip-bg="${bg.id}" style="margin-top:8px;width:100%;background:${equipped?'#82c91e':'#E9ECEF'};color:${equipped?'white':'#868e96'};border:none;border-radius:10px;padding:6px;font-weight:700;font-size:12px;cursor:pointer;">${equipped?'Equipped ✓':'Equip'}</button>`}
          </div>
        </div>`;
      }).join("")}
    </div>
  `;
}
function buyAccessory(id) {
  const item = ACCESSORIES.find(a=>a.id===id);
  if (!item) return;
  if (state.carrots < item.cost) { flashToast("Not enough carrots yet! Keep completing tasks 🥕"); return; }
  state.carrots -= item.cost;
  state.ownedAccessories.push(id);
  flashToast(`Bought ${item.name}!`);
  persist(); render();
}
function equipAccessory(id) {
  if (state.equippedAccessories.includes(id)) state.equippedAccessories = state.equippedAccessories.filter(a=>a!==id);
  else state.equippedAccessories.push(id);
  persist(); render();
}
function buyBackground(id) {
  const bg = BACKGROUNDS.find(b=>b.id===id);
  if (!bg) return;
  if (state.carrots < bg.cost) { flashToast("Not enough carrots yet! Keep completing tasks 🥕"); return; }
  state.carrots -= bg.cost;
  state.ownedBackgrounds.push(id);
  flashToast(`Unlocked ${bg.name}!`);
  persist(); render();
}
function equipBackground(id) {
  state.equippedBackground = id;
  persist(); render();
}

// ====================== MODALS ======================
function renderNamePromptModal() {
  return `<div class="modal-overlay" id="namePromptOverlay">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="font-size:40px;">🌱</div>
      <div style="font-weight:800;font-size:16px;color:#D6336C;margin-top:8px;">Name your Study Buddy!</div>
      <div style="font-size:12px;color:#868e96;margin-top:4px;">Give your little companion a cute name</div>
      <input id="nameInput" placeholder="e.g. Mochi, Pip, Sunny..." style="width:100%;margin-top:14px;box-sizing:border-box;text-align:center;border:2px solid #FFE3EC;" />
      <button class="btn-primary" id="saveNameBtn" style="margin-top:14px;width:100%;">Let's go! ✨</button>
    </div>
  </div>`;
}
function renderApiKeyModal() {
  return `<div class="modal-overlay" id="apiKeyOverlay">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="font-size:36px;">🔑</div>
      <div style="font-weight:800;font-size:15px;color:#D6336C;margin-top:8px;">Connect your Anthropic API key</div>
      <div style="font-size:12px;color:#868e96;margin-top:6px;text-align:left;">
        This standalone site has no server, so AI features (vocab definitions, paper question generation) need your own Anthropic API key.
        It's saved only in this browser's local storage and sent directly to Anthropic — never anywhere else.
        Get a key at <span style="color:#1971C2;">console.anthropic.com</span>.
      </div>
      <input id="apiKeyInput" placeholder="sk-ant-..." style="width:100%;margin-top:14px;box-sizing:border-box;" value="${escapeHtml(getApiKey())}" />
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn-secondary" id="cancelApiKeyBtn" style="flex:1;">Cancel</button>
        <button class="btn-primary" id="saveApiKeyBtn" style="flex:1;">Save</button>
      </div>
    </div>
  </div>`;
}

// ====================== MAIN RENDER ======================
function render() {
  const app = document.getElementById("app");
  let tabHtml = "";
  if (currentTab==="home") tabHtml = renderHome();
  else if (currentTab==="tasks") tabHtml = renderTasks();
  else if (currentTab==="errors") tabHtml = renderErrors();
  else if (currentTab==="vocab") tabHtml = renderVocab();
  else if (currentTab==="papers") tabHtml = renderPapers();
  else if (currentTab==="timer") tabHtml = renderTimer();
  else if (currentTab==="shop") tabHtml = renderShop();

  app.innerHTML = `
    ${renderHeader()}
    ${renderNav()}
    <div>${tabHtml}</div>
    ${showNamePrompt ? renderNamePromptModal() : ""}
    ${showJourneyModal ? renderJourneyModal() : ""}
    ${showApiKeyModal ? renderApiKeyModal() : ""}
    ${viewingError ? renderViewingErrorModal() : ""}
  `;
  attachListeners();
}

function attachListeners() {
  document.querySelectorAll(".navbtn").forEach(btn => {
    btn.addEventListener("click", () => { currentTab = btn.dataset.tab; render(); });
  });

  // Home
  const shareBtn = document.getElementById("shareCardBtn");
  if (shareBtn) shareBtn.addEventListener("click", () => flashToast("📸 Screenshot this card to share with friends!"));
  const avatarNameClick = document.getElementById("avatarNameClick");
  if (avatarNameClick) avatarNameClick.addEventListener("click", () => { showNamePrompt = true; render(); });
  const avatarClick = document.getElementById("avatarClick");
  if (avatarClick) avatarClick.addEventListener("click", () => { showJourneyModal = true; render(); });

  // Journey modal
  const journeyOverlay = document.getElementById("journeyOverlay");
  if (journeyOverlay) journeyOverlay.addEventListener("click", () => { showJourneyModal = false; render(); });
  const closeJourneyBtn = document.getElementById("closeJourneyBtn");
  if (closeJourneyBtn) closeJourneyBtn.addEventListener("click", () => { showJourneyModal = false; render(); });

  // Name modal
  const saveNameBtn = document.getElementById("saveNameBtn");
  if (saveNameBtn) saveNameBtn.addEventListener("click", () => {
    const val = document.getElementById("nameInput").value.trim();
    state.avatarName = val || "Buddy";
    showNamePrompt = false;
    persist(); render();
  });

  // API key modal
  const vocabApiKeyLink = document.getElementById("vocabApiKeyLink");
  if (vocabApiKeyLink) vocabApiKeyLink.addEventListener("click", () => { showApiKeyModal = true; render(); });
  const papersApiKeyLink = document.getElementById("papersApiKeyLink");
  if (papersApiKeyLink) papersApiKeyLink.addEventListener("click", () => { showApiKeyModal = true; render(); });
  const apiKeyOverlay = document.getElementById("apiKeyOverlay");
  if (apiKeyOverlay) apiKeyOverlay.addEventListener("click", () => { showApiKeyModal = false; render(); });
  const cancelApiKeyBtn = document.getElementById("cancelApiKeyBtn");
  if (cancelApiKeyBtn) cancelApiKeyBtn.addEventListener("click", () => { showApiKeyModal = false; render(); });
  const saveApiKeyBtn = document.getElementById("saveApiKeyBtn");
  if (saveApiKeyBtn) saveApiKeyBtn.addEventListener("click", () => {
    const val = document.getElementById("apiKeyInput").value.trim();
    setApiKey(val);
    showApiKeyModal = false;
    flashToast("API key saved!");
    render();
  });

  // Tasks
  const addTaskBtn = document.getElementById("addTaskBtn");
  if (addTaskBtn) addTaskBtn.addEventListener("click", addTask);
  const taskTextInput = document.getElementById("taskTextInput");
  if (taskTextInput) taskTextInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") addTask(); });
  document.querySelectorAll("[data-toggle-task]").forEach(el => el.addEventListener("change", ()=>toggleTask(el.dataset.toggleTask)));
  document.querySelectorAll("[data-delete-task]").forEach(el => el.addEventListener("click", ()=>deleteTask(el.dataset.deleteTask)));

  // Errors
  document.querySelectorAll("[data-error-filter]").forEach(el => el.addEventListener("click", ()=>{ errorFilter = el.dataset.errorFilter; render(); }));
  const errorSubjectSelect = document.getElementById("errorSubjectSelect");
  if (errorSubjectSelect) errorSubjectSelect.addEventListener("change", (e)=>{ errorFormSubject = e.target.value; });
  const errorNoteInput = document.getElementById("errorNoteInput");
  if (errorNoteInput) errorNoteInput.addEventListener("input", (e)=>{ errorFormNote = e.target.value; });
  const errorFileInput = document.getElementById("errorFileInput");
  if (errorFileInput) errorFileInput.addEventListener("change", handleErrorFile);
  document.querySelectorAll("[data-view-error]").forEach(el => el.addEventListener("click", ()=>{
    viewingError = state.errorBank.find(er=>er.id===el.dataset.viewError);
    render();
  }));
  document.querySelectorAll("[data-toggle-mastered]").forEach(el => el.addEventListener("click", ()=>toggleMastered(el.dataset.toggleMastered)));
  document.querySelectorAll("[data-delete-error]").forEach(el => el.addEventListener("click", ()=>deleteError(el.dataset.deleteError)));
  const closeViewErrorBtn = document.getElementById("closeViewErrorBtn");
  if (closeViewErrorBtn) closeViewErrorBtn.addEventListener("click", ()=>{ viewingError=null; render(); });
  const viewErrorOverlay = document.getElementById("viewErrorOverlay");
  if (viewErrorOverlay) viewErrorOverlay.addEventListener("click", ()=>{ viewingError=null; render(); });

  // Vocab
  const vocabWordInputEl = document.getElementById("vocabWordInput");
  if (vocabWordInputEl) {
    vocabWordInputEl.addEventListener("input", (e)=>{ vocabWordInput = e.target.value; });
    vocabWordInputEl.addEventListener("keydown", (e)=>{ if(e.key==="Enter") addVocab(); });
  }
  const addVocabBtn = document.getElementById("addVocabBtn");
  if (addVocabBtn) addVocabBtn.addEventListener("click", addVocab);
  document.querySelectorAll("[data-expand-vocab]").forEach(el => el.addEventListener("click", (e)=>{
    if (e.target.closest("[data-delete-vocab]")) return;
    const id = el.dataset.expandVocab;
    expandedVocabId = expandedVocabId===id ? null : id;
    render();
  }));
  document.querySelectorAll("[data-delete-vocab]").forEach(el => el.addEventListener("click", (e)=>{ e.stopPropagation(); deleteVocab(el.dataset.deleteVocab); }));

  // Papers
  const paperSubjectSelect = document.getElementById("paperSubjectSelect");
  if (paperSubjectSelect) paperSubjectSelect.addEventListener("change", (e)=>{ papersSubject = e.target.value; });
  const paperFileInput = document.getElementById("paperFileInput");
  if (paperFileInput) paperFileInput.addEventListener("change", handlePaperFile);
  document.querySelectorAll("[data-delete-paper]").forEach(el => el.addEventListener("click", ()=>deletePaper(el.dataset.deletePaper)));
  document.querySelectorAll("[data-generate-paper]").forEach(el => el.addEventListener("click", ()=>generateFromPaper(el.dataset.generatePaper)));
  document.querySelectorAll("[data-toggle-answer]").forEach(el => el.addEventListener("click", ()=>{
    const idx = parseInt(el.dataset.toggleAnswer,10);
    if (papersQuestions && papersQuestions[idx]) papersQuestions[idx]._show = !papersQuestions[idx]._show;
    render();
  }));

  // Timer
  document.querySelectorAll("[data-start-timer]").forEach(el => el.addEventListener("click", ()=>startTimer(el.dataset.startTimer)));
  const timerPauseResumeBtn = document.getElementById("timerPauseResumeBtn");
  if (timerPauseResumeBtn) timerPauseResumeBtn.addEventListener("click", timerPauseResume);
  const timerResetBtn = document.getElementById("timerResetBtn");
  if (timerResetBtn) timerResetBtn.addEventListener("click", timerReset);

  // Shop
  document.querySelectorAll("[data-buy-acc]").forEach(el => el.addEventListener("click", ()=>buyAccessory(el.dataset.buyAcc)));
  document.querySelectorAll("[data-equip-acc]").forEach(el => el.addEventListener("click", ()=>equipAccessory(el.dataset.equipAcc)));
  document.querySelectorAll("[data-buy-bg]").forEach(el => el.addEventListener("click", ()=>buyBackground(el.dataset.buyBg)));
  document.querySelectorAll("[data-equip-bg]").forEach(el => el.addEventListener("click", ()=>equipBackground(el.dataset.equipBg)));
}

// ====================== INIT ======================
render();
</script>
</body>
</html>
