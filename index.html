<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eva's Study Garden</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #FFF7FB 0%, #F3F8FF 100%);
    margin: 0;
    padding: 16px;
    color: #495057;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .card {
    background: white;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .title { font-size: 18px; font-weight: 800; color: #D6336C; }
  .pills { display: flex; gap: 8px; }
  .pill {
    background: white;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
    color: #495057;
  }
  .navbar {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding-bottom: 4px;
    margin-bottom: 12px;
  }
  .navbtn {
    flex-shrink: 0;
    border: none;
    background: white;
    color: #868e96;
    border-radius: 14px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 56px;
  }
  .navbtn.active { background: #FFB3CB; color: white; }
  .navbtn .emoji { font-size: 16px; }
  button { font-family: inherit; }
  input, select {
    font-family: inherit;
    border-radius: 10px;
    border: 2px solid #eee;
    padding: 8px 10px;
    font-size: 13px;
  }
  .empty { text-align: center; padding: 30px 10px; color: #adb5bd; }
  .empty .emoji { font-size: 32px; }
  .empty .text { font-size: 13px; margin-top: 6px; }
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border: 2px solid #FFB3CB;
    border-radius: 14px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #D6336C;
    z-index: 60;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    transition: opacity 0.3s;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 70;
    padding: 20px;
  }
  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 24px;
    max-width: 340px;
    max-height: 85vh;
    overflow-y: auto;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .btn-primary {
    background: #FFB3CB; color: white; border: none; border-radius: 12px;
    padding: 10px 18px; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .btn-secondary {
    background: #FFE3EC; color: #D6336C; border: none; border-radius: 12px;
    padding: 10px 18px; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .stat-box .emoji { font-size: 18px; }
  .stat-box .value { font-weight: 800; font-size: 16px; color: #495057; }
  .stat-box .label { font-size: 10px; color: #adb5bd; }
  .subject-pill { font-size: 9px; font-weight: 700; border-radius: 8px; padding: 2px 6px; }
  .err-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .err-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .err-card img { width: 100%; height: 110px; object-fit: cover; cursor: pointer; display: block; }
  .err-card .body { padding: 8px; }
  .task-row { display: flex; align-items: center; gap: 8px; background: white; border-radius: 12px; padding: 10px; margin-bottom: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
  .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .shop-item { background: white; border-radius: 14px; padding: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .bg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .bg-item { border-radius: 14px; padding: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: relative; overflow: hidden; }
  .journey-stage { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; margin-bottom: 6px; }
  .vocab-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; }
  .upload-label {
    display: block; text-align: center; color: white; border-radius: 10px;
    padding: 10px; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  ::-webkit-scrollbar { height: 4px; }
</style>
</head>

  { id: "bg_meadow", name: "Spring Meadow", cost: 50, css: "linear-gradient(135deg, #D8F5A2, #96F2D7)" },
  { id: "bg_sunset", name: "Cotton Candy Sunset", cost: 90, css: "linear-gradient(135deg, #FFC9DE, #FFD8A8)" },
  { id: "bg_galaxy", name: "Dreamy Galaxy", cost: 140, css: "linear-gradient(135deg, #D0BFFF, #A5D8FF)" },
  { id: "bg_garden", name: "Blossom Garden", cost: 180, css: "linear-gradient(135deg, #FFB3CB, #C3FAE8)" },

];

function uid() { return Math.random().toString(36).slice(2, 10); }
function getStage(stars) {
  var stage = STAGES[0];
  for (var i = 0; i < STAGES.length; i++) { if (stars >= STAGES[i].min) stage = STAGES[i]; }
  return stage;
}
function nextStage(stars) {
  for (var i = 0; i < STAGES.length; i++) { if (STAGES[i].min > stars) return STAGES[i]; }
  return null;
}
function daysWeeksUntil(target) {
  var now = new Date();
  var diffMs = target.getTime() - now.getTime();
  var days = Math.max(0, Math.ceil(diffMs / 86400000));
  return { days: days, weeks: Math.floor(days / 7), remDays: days % 7 };
}
function startOfWeek(d) {
  var date = new Date(d);
  var day = date.getDay();
  date.setDate(date.getDate() - day + (day === 0 ? -6 : 1));
  date.setHours(0, 0, 0, 0);
  return date;
}
function weekKey(ts) { return startOfWeek(new Date(ts)).toISOString().slice(0, 10); }
function escapeHtml(str) {
  if (!str) return "";
  return String(str).split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;").split('"').join("&quot;");
}

var STORAGE_KEY = "eva-study-garden-state";
var DEFAULT_STATE = {
  avatarName: "",
  stars: 0,
  carrots: 0,
  streak: 0,
  lastCompletionDate: null,
  freezeAvailable: true,
  ownedAccessories: [],
  equippedAccessories: [],
  ownedBackgrounds: ["bg_default"],
  equippedBackground: "bg_default",
  tasks: [],
  errorBank: [],
  vocabBank: [],
  papers: []
};

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      var merged = {};
      for (var k in DEFAULT_STATE) merged[k] = DEFAULT_STATE[k];
      for (var k2 in parsed) merged[k2] = parsed[k2];
      return merged;
    }
  } catch (e) { console.error("load failed", e); }
  return null;
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.error("save failed", e); }
}

function getApiKey() { return localStorage.getItem("eva-study-garden-api-key") || ""; }
function setApiKey(key) { localStorage.setItem("eva-study-garden-api-key", key); }

function callClaude(messages, system) {
  var apiKey = getApiKey();
  if (!apiKey) {
    return Promise.reject(new Error("NO_API_KEY"));
  }
  return fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      system: system,
      messages: messages
    })
  }).then(function(res) {
    if (!res.ok) {
      return res.text().then(function(errText) {
        throw new Error("API_ERROR: " + errText);
      });
    }
    return res.json();
  }).then(function(data) {
    var blocks = data.content || [];
    var out = "";
    for (var i = 0; i < blocks.length; i++) {
      if (blocks[i].type === "text") out += blocks[i].text + "\n";
    }
    return out;
  });
}

function extractJson(text) {
  var clean = text.trim();
  clean = clean.split("```json").join("").split("```").join("").trim();
  try {
    return JSON.parse(clean);
  } catch (e) {
    var firstObj = clean.indexOf("{");
    var firstArr = clean.indexOf("[");
    var first = -1;
    if (firstObj === -1) first = firstArr;
    else if (firstArr === -1) first = firstObj;
    else first = Math.min(firstObj, firstArr);
    var last = Math.max(clean.lastIndexOf("}"), clean.lastIndexOf("]"));
    if (first !== -1 && last !== -1) {
      try { return JSON.parse(clean.slice(first, last + 1)); } catch (e2) { return null; }
    }
    return null;
  }
}

function readFileAsDataURL(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

var state = loadState() || JSON.parse(JSON.stringify(DEFAULT_STATE));

var timerActiveId = null;

var timerInterval = null;

function flashToast(msg) {
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.style.opacity = "0"; }, 1900);
  setTimeout(function() { el.remove(); }, 2300);
}

function burstConfetti() {
  var colors = ["#FFB3CB", "#A5D8FF", "#96F2D7", "#FFE066", "#D0BFFF"];
  for (var i = 0; i < 24; i++) {
    (function(i) {
      var piece = document.createElement("div");
      var left = Math.random() * 100;
      var delay = Math.random() * 0.4;
      var dur = 1.2 + Math.random() * 0.8;
      var color = colors[i % colors.length];
      piece.style.position = "fixed";
      piece.style.left = left + "%";
      piece.style.top = "-10px";
      piece.style.width = "8px";
      piece.style.height = "8px";
      piece.style.background = color;
      piece.style.borderRadius = i % 2 === 0 ? "50%" : "2px";
      piece.style.zIndex = "999";
      piece.style.pointerEvents = "none";
      piece.style.animation = "fall " + dur + "s " + delay + "s ease-in forwards";
      document.body.appendChild(piece);
      setTimeout(function() { piece.remove(); }, (dur + delay) * 1000 + 100);
    })(i);
  }
}
var styleTag = document.createElement("style");
styleTag.textContent = "@keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0.3; } }";
document.head.appendChild(styleTag);

function renderHome() {
  var stage = getStage(state.stars);
  var upcoming = nextStage(state.stars);
  var progress = upcoming ? Math.min(100, ((state.stars - stage.min) / (upcoming.min - stage.min)) * 100) : 100;
  var dw = daysWeeksUntil(PSLE_DATE);
  var now = Date.now();
  var thisWeekKey = weekKey(now);
  var lastWeekKey = weekKey(now - 7 * 86400000);
  var tasksThisWeek = 0, tasksLastWeek = 0, masteredThisWeek = 0, vocabThisWeek = 0;
  for (var i = 0; i < state.tasks.length; i++) {
    var t = state.tasks[i];
    if (t.done && t.completedAt) {
      if (weekKey(t.completedAt) === thisWeekKey) tasksThisWeek++;
      if (weekKey(t.completedAt) === lastWeekKey) tasksLastWeek++;
    }
  }
  for (var j = 0; j < state.errorBank.length; j++) {
    var er = state.errorBank[j];
    if (er.mastered && weekKey(er.createdAt) === thisWeekKey) masteredThisWeek++;
  }
  for (var k = 0; k < state.vocabBank.length; k++) {
    if (weekKey(state.vocabBank[k].createdAt) === thisWeekKey) vocabThisWeek++;
  }
  var taskDelta = tasksThisWeek - tasksLastWeek;
  var bg = null;
  for (var b = 0; b < BACKGROUNDS.length; b++) { if (BACKGROUNDS[b].id === state.equippedBackground) bg = BACKGROUNDS[b]; }
  if (!bg) bg = BACKGROUNDS[0];

  var motivationalMsgs = [
    (state.avatarName || "Your buddy") + " believes in you! 💪",
    "Every task done is a step closer to PSLE success! 🌟",
    "Small steps every day lead to big results! 🌱",
    "You've got this, keep the streak alive! 🔥"
  ];
  var msg = motivationalMsgs[new Date().getDate() % motivationalMsgs.length];

  var html = '';
  html += '<div class="card" style="text-align:center;padding:20px;">';
  html += '<div id="avatarNameClick" style="font-size:13px;font-weight:700;color:#D6336C;margin-bottom:8px;cursor:pointer;">' + escapeHtml(state.avatarName || "Your Buddy") + ' ✏️</div>';
  html += '<div id="avatarClick" style="cursor:pointer;">' + avatarHtml(stage, state.equippedAccessories, 120, bg.css) + '</div>';
  html += '<div style="margin-top:10px;font-weight:800;font-size:17px;color:#495057;">' + stage.name + '</div>';
  html += '<div style="font-size:11px;color:#bdb8ce;margin-top:2px;">(Tap your buddy to see the full growth journey)</div>';
  html += '<div style="font-size:12px;color:#adb5bd;margin-top:6px;">' + (upcoming ? ((upcoming.min - state.stars) + ' ⭐ to evolve into ' + upcoming.name + ' ' + upcoming.emoji) : "Max evolution reached! 🎉") + '</div>';
  html += '<div style="background:#f1f3f5;border-radius:10px;height:10px;margin-top:10px;overflow:hidden;"><div style="width:' + progress + '%;height:100%;background:linear-gradient(90deg,#FFB3CB,#A5D8FF);border-radius:10px;"></div></div>';
  html += '<button class="btn-secondary" id="shareCardBtn" style="margin-top:16px;">📤 Share Avatar Card</button>';
  html += '</div>';

  html += '<div class="card" style="background:linear-gradient(135deg,#FFD8A8,#FFEC99);text-align:center;">';

function toggleTask(id) {
  var task = null;
  for (var i = 0; i < state.tasks.length; i++) { if (state.tasks[i].id === id) task = state.tasks[i]; }
  if (!task) return;
  var willBeDone = !task.done;
  task.done = willBeDone;
  task.completedAt = willBeDone ? Date.now() : null;
  if (willBeDone) {
    state.stars += 2;
    state.carrots += 1;
    var today = new Date().toDateString();
    if (state.lastCompletionDate !== today) {
      var yesterday = new Date(Date.now() - 86400000).toDateString();
      if (state.lastCompletionDate === yesterday) {
        state.streak += 1;
      } else if (state.freezeAvailable && state.lastCompletionDate) {
        state.streak += 1;
        state.freezeAvailable = false;
      } else {
        state.streak = 1;
      }
      state.lastCompletionDate = today;
      if (state.streak > 0 && state.streak % 7 === 0) state.freezeAvailable = true;
    }
    burstConfetti();
    flashToast("+2 ⭐ +1 🥕 Task complete!");
  } else {
    state.stars = Math.max(0, state.stars - 2);
    state.carrots = Math.max(0, state.carrots - 1);
  }
  persist();
  render();
}

  }
  errorNotes = errorNotes.slice(0, 10);
  var system = "You are a PSLE tutor. You will be given a PDF of a past year exam paper. It may be a scanned, image-based PDF, read it using your vision and document capability, page by page, exactly as if reading scanned photographs of paper. Even if the PDF has no selectable text layer, look at the visual content of each page. Respond ONLY with valid JSON: an array of 5 objects, each with keys: question, answer, explanation. If you genuinely cannot see any readable content in the PDF at all, respond with exactly this and nothing else: {\\"error\\": \\"unreadable\\"}";
  if (errorNotes.length) system += " The student has previously struggled with: " + errorNotes.join("; ") + ". Prioritise targeting these weak areas.";

  var messages = [{ role: "user", content: [
    { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } },
    { type: "text", text: "This is a " + paper.subject + " PSLE past year paper. Generate 5 fresh practice questions in the same style, targeting the student's weak areas if provided." }
  ]}];

  callClaude(messages, system).then(function(text) {
    var parsed = extractJson(text);
    if (!parsed) {
      papersErrorMsg = "Couldn't understand the response. The scan may be too blurry, rotated, or low contrast. Try rescanning with good lighting and a straight angle.";
      papersQuestions = [];
    } else if (parsed.error === "unreadable") {
      papersErrorMsg = "This PDF couldn't be read — it might be password-protected, corrupted, or the scan quality is too low. Try re-scanning at higher resolution.";
      papersQuestions = [];
    } else if (Array.isArray(parsed)) {
      papersQuestions = parsed;
      state.carrots += 3;
      flashToast("+3 🥕 Practice questions ready!");
    } else {
      papersErrorMsg = "Unexpected response format. Please try again.";
      papersQuestions = [];
    }
    papersGenerating = false;
    persist(); render();
  }).catch(function(err) {
    if (err.message === "NO_API_KEY") { showApiKeyModal = true; }
    else papersErrorMsg = "Something went wrong reading this PDF. Check your internet connection / API key and try again, or try a smaller file.";
    papersGenerating = false;
    persist(); render();
  });
}

function renderTimer() {
  var active = null;
  for (var i = 0; i < TIMERS.length; i++) { if (TIMERS[i].id === timerActiveId) active = TIMERS[i]; }
  function fmt(s) { var m = Math.floor(s/60), sec = s%60; return String(m).padStart(2,'0') + ":" + String(sec).padStart(2,'0'); }
  var html = '';
  if (active) {
    html += '<div class="card" style="text-align:center;padding:20px;">';
    html += '<div style="font-size:13px;font-weight:700;color:#868e96;">' + active.label + '</div>';
    html += '<div style="font-size:40px;font-weight:800;color:' + (timerSecondsLeft<60?'#FA5252':'#D6336C') + ';margin:8px 0;font-family:monospace;">' + fmt(timerSecondsLeft) + '</div>';
    if (timerSecondsLeft === 0) html += '<div style="font-size:14px;font-weight:700;color:#82c91e;">⏰ Time\\'s up! Well done!</div>';
    html += '<div style="display:flex;gap:8px;justify-content:center;margin-top:8px;">';
    html += '<button id="timerPauseResumeBtn" ' + (timerSecondsLeft===0?'disabled':'') + ' style="background:#A5D8FF;color:#1971C2;border:none;border-radius:10px;padding:8px 16px;font-weight:700;cursor:pointer;">' + (timerRunning?'Pause':'Resume') + '</button>';
    html += '<button id="timerResetBtn" style="background:#FFE3EC;color:#D6336C;border:none;border-radius:10px;padding:8px 16px;font-weight:700;cursor:pointer;">Reset</button></div>';
    html += '<div style="margin-top:14px;text-align:left;background:#FFF9DB;border-radius:12px;padding:12px;"><div style="font-size:12px;font-weight:700;color:#846b00;margin-bottom:6px;">💡 Tips for this paper</div>';
    for (var t = 0; t < active.tips.length; t++) html += '<div style="font-size:12px;color:#846b00;margin-bottom:4px;display:flex;gap:6px;"><span>•</span><span>' + active.tips[t] + '</span></div>';
    html += '</div></div>';
  } else {
    html += '<div class="empty"><div class="emoji">⏱</div><div class="text">Pick a PSLE paper below to start an exam timer.</div></div>';
  }
  html += '<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px;">';
  for (var k = 0; k < TIMERS.length; k++) {
    var tm = TIMERS[k];
    html += '<button data-start-timer="' + tm.id + '" style="display:flex;justify-content:space-between;align-items:center;background:white;border:none;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);cursor:pointer;text-align:left;">' +
      '<span style="font-size:13px;font-weight:700;color:#495057;">' + tm.label + '</span><span style="font-size:12px;color:#adb5bd;">' + tm.mins + ' min</span></button>';
  }
  html += '</div>';
  return html;
}
function startTimer(id) {
  var t = null;
  for (var i = 0; i < TIMERS.length; i++) { if (TIMERS[i].id === id) t = TIMERS[i]; }
  if (!t) return;
  timerActiveId = id;
  timerSecondsLeft = t.mins * 60;
  timerRunning = true;
  clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    timerSecondsLeft -= 1;
    if (timerSecondsLeft <= 0) { timerSecondsLeft = 0; timerRunning = false; clearInterval(timerInterval); }
    render();
  }, 1000);
  render();
}
function timerPauseResume() {
  timerRunning = !timerRunning;
  if (timerRunning) {
    clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      timerSecondsLeft -= 1;
      if (timerSecondsLeft <= 0) { timerSecondsLeft = 0; timerRunning = false; clearInterval(timerInterval); }
      render();
    }, 1000);
  } else {
    clearInterval(timerInterval);
  }
  render();
}
function timerReset() {
  clearInterval(timerInterval);
  timerActiveId = null; timerSecondsLeft = 0; timerRunning = false;
  render();
}

  html += '</div>';

  for (var b = 0; b < BACKGROUNDS.length; b++) {

      html += '<button data-buy-bg="' + bg.id + '" style="margin-top:8px;width:100%;background:#FFD8A8;color:#9C6B00;border:none;border-radius:10px;padding:6px;font-weight:700;font-size:12px;cursor:pointer;">🥕 ' + bg.cost + '</button>';

function buyAccessory(id) {
  var item = null;
  for (var i = 0; i < ACCESSORIES.length; i++) { if (ACCESSORIES[i].id === id) item = ACCESSORIES[i]; }
  if (!item) return;
  if (state.carrots < item.cost) { flashToast("Not enough carrots yet! Keep completing tasks 🥕"); return; }
  state.carrots -= item.cost;
  state.ownedAccessories.push(id);
  flashToast("Bought " + item.name + "!");
  persist(); render();
}
function equipAccessory(id) {
  var idx = state.equippedAccessories.indexOf(id);
  if (idx !== -1) state.equippedAccessories.splice(idx, 1);
  else state.equippedAccessories.push(id);
  persist(); render();
}
function buyBackground(id) {
  var bg = null;
  for (var i = 0; i < BACKGROUNDS.length; i++) { if (BACKGROUNDS[i].id === id) bg = BACKGROUNDS[i]; }
  if (!bg) return;
  if (state.carrots < bg.cost) { flashToast("Not enough carrots yet! Keep completing tasks 🥕"); return; }
  state.carrots -= bg.cost;
  state.ownedBackgrounds.push(id);
  flashToast("Unlocked " + bg.name + "!");
  persist(); render();
}
function equipBackground(id) {
  state.equippedBackground = id;
  persist(); render();
}

  else if (currentTab === "papers") tabHtml = renderPapers();
  else if (currentTab === "timer") tabHtml = renderTimer();
  else if (currentTab === "shop") tabHtml = renderShop();

  app.innerHTML = renderHeader() + renderNav() + '<div>' + tabHtml + '</div>' +
