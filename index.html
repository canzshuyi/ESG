<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eva's Study Garden</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #FFF7FB 0%, #F3F8FF 100%);
    margin: 0;
    padding: 16px;
    color: #495057;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .card {
    background: white;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .title { font-size: 18px; font-weight: 800; color: #D6336C; }
  .pills { display: flex; gap: 8px; }
  .pill {
    background: white;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
    color: #495057;
  }
  .navbar {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding-bottom: 4px;
    margin-bottom: 12px;
  }
  .navbtn {
    flex-shrink: 0;
    border: none;
    background: white;
    color: #868e96;
    border-radius: 14px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 56px;
  }
  .navbtn.active { background: #FFB3CB; color: white; }
  .navbtn .emoji { font-size: 16px; }
  button { font-family: inherit; }
  input, select {
    font-family: inherit;
    border-radius: 10px;
    border: 2px solid #eee;
    padding: 8px 10px;
    font-size: 13px;
  }
  .empty { text-align: center; padding: 30px 10px; color: #adb5bd; }
  .empty .emoji { font-size: 32px; }
  .empty .text { font-size: 13px; margin-top: 6px; }
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border: 2px solid #FFB3CB;
    border-radius: 14px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #D6336C;
    z-index: 60;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    transition: opacity 0.3s;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 70;
    padding: 20px;
  }
  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 24px;
    max-width: 340px;
    max-height: 85vh;
    overflow-y: auto;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .btn-primary {
    background: #FFB3CB; color: white; border: none; border-radius: 12px;
    padding: 10px 18px; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .btn-secondary {
    background: #FFE3EC; color: #D6336C; border: none; border-radius: 12px;
    padding: 10px 18px; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .stat-box .emoji { font-size: 18px; }
  .stat-box .value { font-weight: 800; font-size: 16px; color: #495057; }
  .stat-box .label { font-size: 10px; color: #adb5bd; }
  .subject-pill { font-size: 9px; font-weight: 700; border-radius: 8px; padding: 2px 6px; }
  .err-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .err-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .err-card img { width: 100%; height: 110px; object-fit: cover; cursor: pointer; display: block; }
  .err-card .body { padding: 8px; }
  .task-row { display: flex; align-items: center; gap: 8px; background: white; border-radius: 12px; padding: 10px; margin-bottom: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
  .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .shop-item { background: white; border-radius: 14px; padding: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .bg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .bg-item { border-radius: 14px; padding: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: relative; overflow: hidden; }
  .journey-stage { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; margin-bottom: 6px; }
  .vocab-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; }
  .upload-label {
    display: block; text-align: center; color: white; border-radius: 10px;
    padding: 10px; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  ::-webkit-scrollbar { height: 4px; }
</style>
</head>

function uid() { return Math.random().toString(36).slice(2, 10); }
function getStage(stars) {
  var stage = STAGES[0];
  for (var i = 0; i < STAGES.length; i++) { if (stars >= STAGES[i].min) stage = STAGES[i]; }
  return stage;
}
function nextStage(stars) {
  for (var i = 0; i < STAGES.length; i++) { if (STAGES[i].min > stars) return STAGES[i]; }
  return null;
}
function daysWeeksUntil(target) {
  var now = new Date();
  var diffMs = target.getTime() - now.getTime();
  var days = Math.max(0, Math.ceil(diffMs / 86400000));
  return { days: days, weeks: Math.floor(days / 7), remDays: days % 7 };
}
function startOfWeek(d) {
  var date = new Date(d);
  var day = date.getDay();
  date.setDate(date.getDate() - day + (day === 0 ? -6 : 1));
  date.setHours(0, 0, 0, 0);
  return date;
}
function weekKey(ts) { return startOfWeek(new Date(ts)).toISOString().slice(0, 10); }
function escapeHtml(str) {
  if (!str) return "";
  return String(str).split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;").split('"').join("&quot;");
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      var merged = {};
      for (var k in DEFAULT_STATE) merged[k] = DEFAULT_STATE[k];
      for (var k2 in parsed) merged[k2] = parsed[k2];
      return merged;
    }
  } catch (e) { console.error("load failed", e); }
  return null;
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.error("save failed", e); }
}

function readFileAsDataURL(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function flashToast(msg) {
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.style.opacity = "0"; }, 1900);
  setTimeout(function() { el.remove(); }, 2300);
}

function burstConfetti() {
  var colors = ["#FFB3CB", "#A5D8FF", "#96F2D7", "#FFE066", "#D0BFFF"];
  for (var i = 0; i < 24; i++) {
    (function(i) {
      var piece = document.createElement("div");
      var left = Math.random() * 100;
      var delay = Math.random() * 0.4;
      var dur = 1.2 + Math.random() * 0.8;
      var color = colors[i % colors.length];
      piece.style.position = "fixed";
      piece.style.left = left + "%";
      piece.style.top = "-10px";
      piece.style.width = "8px";
      piece.style.height = "8px";
      piece.style.background = color;
      piece.style.borderRadius = i % 2 === 0 ? "50%" : "2px";
      piece.style.zIndex = "999";
      piece.style.pointerEvents = "none";
      piece.style.animation = "fall " + dur + "s " + delay + "s ease-in forwards";
      document.body.appendChild(piece);
      setTimeout(function() { piece.remove(); }, (dur + delay) * 1000 + 100);
    })(i);
  }
}
var styleTag = document.createElement("style");
styleTag.textContent = "@keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0.3; } }";

function avatarSvg(stage, equipped, size, bgCss) {

    var item = CLOTHING[i];
    if (equipped.indexOf(item.id) !== -1) bySlot[item.slot].push(item.id);
  }
  var layers = "";
  for (var b = 0; b < bySlot.back.length; b++) layers += clothingPieceSvg(bySlot.back[b], c);

  var blob = '<g>' +
    '<ellipse cx="100" cy="110" rx="58" ry="64" fill="' + c.body + '" stroke="' + c.outline + '" stroke-width="4"/>' +

    '<circle cx="78" cy="101" r="2" fill="#fff"/><circle cx="126" cy="101" r="2" fill="#fff"/>' +
    '<ellipse cx="68" cy="124" rx="9" ry="6" fill="' + c.cheek + '" opacity="0.7"/>' +
    '<ellipse cx="132" cy="124" rx="9" ry="6" fill="' + c.cheek + '" opacity="0.7"/>' +
    '<path d="M88,128 Q100,138 112,128" fill="none" stroke="#495057" stroke-width="3" stroke-linecap="round"/>' +
    '</g>';

  var midLayers = "";
  for (var bi = 0; bi < bySlot.body.length; bi++) midLayers += clothingPieceSvg(bySlot.body[bi], c);

function toggleTask(id) {
  var task = null;
  for (var i = 0; i < state.tasks.length; i++) { if (state.tasks[i].id === id) task = state.tasks[i]; }
  if (!task) return;
  var willBeDone = !task.done;
  task.done = willBeDone;
  task.completedAt = willBeDone ? Date.now() : null;
  if (willBeDone) {
    state.stars += 2;
    state.carrots += 1;
    var today = new Date().toDateString();
    if (state.lastCompletionDate !== today) {
      var yesterday = new Date(Date.now() - 86400000).toDateString();
      if (state.lastCompletionDate === yesterday) {
        state.streak += 1;
      } else if (state.freezeAvailable && state.lastCompletionDate) {
        state.streak += 1;
        state.freezeAvailable = false;
      } else {
        state.streak = 1;
      }
      state.lastCompletionDate = today;
      if (state.streak > 0 && state.streak % 7 === 0) state.freezeAvailable = true;
    }
    burstConfetti();
    flashToast("+2 ⭐ +1 🥕 Task complete!");
  } else {
    state.stars = Math.max(0, state.stars - 2);
    state.carrots = Math.max(0, state.carrots - 1);
  }
  persist();
  render();
}

function fetchWithTimeout(url, ms) {
  var controller = (typeof AbortController !== "undefined") ? new AbortController() : null;
  var timeoutId = controller ? setTimeout(function() { controller.abort(); }, ms) : null;
  return fetch(url, controller ? { signal: controller.signal } : {}).finally(function() {
    if (timeoutId) clearTimeout(timeoutId);
  });
}

function addVocab() {
  var word = document.getElementById("vocabWordInput").value.trim();
  if (!word) return;
  vocabLoading = true; vocabErrorMsg = null; render();
  fetchWithTimeout("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(word.toLowerCase()), 8000)
    .then(function(res) {
      if (res.status === 404) throw new Error("NOT_FOUND");
      if (!res.ok) throw new Error("SERVER_ERROR");
      return res.json();
    })
    .then(function(data) {
      var entry = data && data[0];
      var partOfSpeech = "", definition = "", example = "";
      if (entry && entry.meanings && entry.meanings.length) {
        var meaning = entry.meanings[0];
        partOfSpeech = meaning.partOfSpeech || "";
        if (meaning.definitions && meaning.definitions.length) {
          definition = meaning.definitions[0].definition || "";
          example = meaning.definitions[0].example || "";
          if (!example) {
            for (var d = 0; d < meaning.definitions.length; d++) {
              if (meaning.definitions[d].example) { example = meaning.definitions[d].example; break; }
            }
          }
        }
      }
      if (!definition) throw new Error("NO_DEFINITION");
      state.vocabBank.unshift({ id: uid(), word: word, partOfSpeech: partOfSpeech, definition: definition, example: example, createdAt: Date.now() });
      state.carrots += 1;
      flashToast("+1 🥕 Vocab added!");
      vocabWordInput = "";
      vocabLoading = false;
      persist(); render();
    })
    .catch(function(err) {
      if (err && (err.name === "AbortError")) {
        vocabErrorMsg = 'The dictionary took too long to respond. Check your internet connection and try again.';
      } else if (err && (err.message === "NOT_FOUND" || err.message === "NO_DEFINITION")) {
        vocabErrorMsg = 'Could not find a dictionary entry for "' + word + '". Check the spelling and try again.';
      } else if (err instanceof TypeError) {
        vocabErrorMsg = 'Could not reach the dictionary service. If you opened this file directly (file://), try running it through a local web server or hosting it online instead — browsers often block this kind of request from local files.';
      } else {
        vocabErrorMsg = 'Something went wrong looking up "' + word + '". Please try again.';
      }
      vocabLoading = false;
      render();
    });
}

function startTimer(id) {
  var t = null;
  for (var i = 0; i < TIMERS.length; i++) { if (TIMERS[i].id === id) t = TIMERS[i]; }
  if (!t) return;
  timerActiveId = id;
  timerSecondsLeft = t.mins * 60;
  timerRunning = true;
  clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    timerSecondsLeft -= 1;
    if (timerSecondsLeft <= 0) { timerSecondsLeft = 0; timerRunning = false; clearInterval(timerInterval); }
    render();
  }, 1000);
  render();
}
function timerPauseResume() {
  timerRunning = !timerRunning;
  if (timerRunning) {
    clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      timerSecondsLeft -= 1;
      if (timerSecondsLeft <= 0) { timerSecondsLeft = 0; timerRunning = false; clearInterval(timerInterval); }
      render();
    }, 1000);
  } else {
    clearInterval(timerInterval);
  }
  render();
}
function timerReset() {
  clearInterval(timerInterval);
  var t = null;
  for (var i = 0; i < TIMERS.length; i++) { if (TIMERS[i].id === timerActiveId) t = TIMERS[i]; }
  timerSecondsLeft = t ? t.mins * 60 : 0;
  timerRunning = false;
  render();
}
